<!DOCTYPE html>
<html lang="ko-KR">
  {{- partial "head.html" . -}}
  <body>
    {{- partial "nav.html" . -}}
    {{- partial "header.html" . -}}
    <main class="wrap">
      {{- block "main" . }}{{- end }}
    </main>
    {{- if and (not .Params.hideFooter) (not (eq .Kind "taxonomy")) }}{{- partial "footer.html" . -}}{{- end }}
    {{- partial "scripts.html" . -}}
  </body>
</html>
