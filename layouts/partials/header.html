{{ if and (not .Params.hideHeader) (not (and (eq .Kind "page") (eq .Type "post"))) (not (eq .Kind "taxonomy")) }}
<header class="site-head wrap">
  <a href="{{ .Site.BaseURL }}" class="site-head__title">{{ .Site.Title }}</a>
  {{ if .IsHome }}
    {{ with .Site.Params.mainpagesubtitle }}<p class="site-head__sub">{{ . }}</p>{{ end }}
  {{ end }}
</header>
{{ end }}
